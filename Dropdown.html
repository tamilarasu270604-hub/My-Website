
<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <title>Pseudo-element Demo</title> 
  <style> 
 /* Style the dropdown container */ 
.dropdown { 
  position: relative; 
  display: block; 
} 
 
/* Style the dropdown button */ 
.dropbtn { 
  background-color: #4CAF50; 
  color: white; 
  padding: 12px 20px; 
  font-size: 16px; 
  border: none; 
  cursor: pointer; 
} 
 
/* Dropdown content (hidden by default) */ 
.dropdown-content { 
  display: none; 
  position: absolute; 
  background-color: #f9f9f9; 
  min-width: 160px; 
  box-shadow: 0 8px 16px rgba(22, 18, 18, 0.2); 
  z-index: 1; 
} 
.dropdown-content a { 
  color: black; 
  padding: 12px 16px; 
  text-decoration: none; 
  display: block; 
} 
 
/* Link hover effect */ 
.dropdown-content a:hover { 
  background-color: #f1f1f1; 
} 
 
/* Show dropdown on hover */ 
.dropdown:hover .dropdown-content { 
  display: block; 
} 
.dropdown:hover .dropdown-content { 
  display: block; 
 
/* Change button color on hover */ 
 
.dropdown:hover .dropbtn { 
  background-color: #3e8e41; 
} 
 
/* Links within the dropdown */ 

 
  </style> 
</head> 
<body> 
<div class="dropdown"> 
  <button class="dropbtn">Menu</button> 
  <div class="dropdown-content"> 
    <a href="#">Link 1</a> 
    <a href="#">Link 2</a> 
    <a href="#">Link 3</a> 
  </div> 
</div> 
</body> 
</html>
